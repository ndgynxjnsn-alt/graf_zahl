# Mimir monolithic, single tenant (multitenancy disabled -> tenant "anonymous").
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/tsdb-sync

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/ruler

compactor:
  data_dir: /data/compactor

ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

limits:
  # Enable exemplar storage so metric->trace links work.
  max_global_exemplars_per_user: 100000
  # Promote OTLP resource attributes to metric labels so `service_name`
  # and `deployment_environment` are queryable on every series.
  # (Mimir expects a comma-separated string here, not a YAML list.)
  promote_otel_resource_attributes: "service.name,deployment.environment"
