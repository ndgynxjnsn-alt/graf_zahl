# Tempo 3.x monolithic (-target=all), single tenant (multitenancy disabled).
#
# Tempo 3.0 changed its architecture: in monolithic mode the distributor pushes
# spans in-process to the live-store (which serves recent queries, builds blocks
# and handles retention) and to the metrics-generator. No Kafka, no ingest /
# block_builder / compactor blocks are needed.
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

# Generate span metrics + service graphs and remote-write them to Mimir,
# so RED metrics and exemplars have somewhere to land.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
